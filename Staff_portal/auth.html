<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Staff Portal</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
   <link rel="icon" type="image/png" href="../../Public/Logo-main.png">
</head>
<body class="bg-[#2C3544] min-h-screen flex items-center justify-center">

   <div class="w-full m-5">
       <div class="grid grid-cols-5 items-center"> <div class="hidden lg:block"></div>


           <div class="col-span-5 lg:col-span-3 bg-[#080808] rounded-xl p-8 shadow-2xl">
               <form action="index.html">
                   <div class="text-center mb-8">
                       <div class="inline-block p-4 rounded-full bg-blue-500/10 mb-4">
                           <i class="bi bi-file-person text-xl text-blue-400" style="font-size: 32px;"></i>
                       </div>
                       <h2 class="text-2xl font-bold text-[#F1F5F9]">Staff Log In</h2>
                       <p class="text-[#8A95A5] text-sm mt-1">TechNova Staff Portal</p>
                   </div>
                  
                   <div class="space-y-5">
                       <input type="text" placeholder="Staff Username" required class="w-full bg-[#080808] border border-[#8A95A5]/30 p-4 rounded-lg text-white focus:border-blue-500 outline-none transition-all">
                       <input type="password" placeholder="Password" required class="w-full bg-[#080808] border border-[#8A95A5]/30 p-4 rounded-lg text-white focus:border-blue-500 outline-none transition-all">


                       <div class="text-left">
                           <a href="#" class="text-[#8A95A5] text-xs hover:text-blue-400 hover:underline">Forgot password?</a>
                       </div>


                       <button type="submit" class="w-full bg-[#f4a236] text-[#080808] py-3 px-8 rounded font-medium text-sm tracking-widest uppercase hover:bg-[#e09222] transition-all shadow-lg">
                           Log In
                       </button>
                      
                       <div class="text-center">
                           <a href="../../Public/index.html" class="text-[#8A95A5] text-xs hover:text-[#F1F5F9]">Return to main site</a>
                       </div>
                   </div>
               </form>
           </div>


           <div class="hidden lg:block"></div>


       </div>
   </div>
</body>
</html>
